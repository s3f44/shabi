<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件</title>
    <style>
        /* 让页面内容整体居中 */
        body {
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        /* 缩小图片尺寸 */
        img {
            width: 50%; /* 可以根据需要调整，比如 30%、400px */
            max-width: 600px; /* 限制最大宽度，避免太大 */
            height: auto; /* 保持图片比例 */
            margin-bottom: 20px;
        }
        /* 放大并居中文字 */
        p {
            font-size: 20px; /* 字体大小，可调整 */
            line-height: 1.6;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    < img src="renji.png" alt="图片">
    <p>我是柳州职业技术大学zxy，老师没有教你陌生链接不要点吗？</p >
    <p>傻福</p >
</body>
</html>
